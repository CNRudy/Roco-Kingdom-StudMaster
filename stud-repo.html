<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>种公仓库 · 蛋组覆盖分析</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #eef3e9; }
        .stats-card {
            background: #f9f5e3;
            border-radius: 28px;
            padding: 1rem;
            margin-bottom: 2rem;
        }
        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin: 1rem 0;
        }
        .action-buttons button, .action-buttons a {
            background: #2b5e2f;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 8px 20px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            font-size: 0.9rem;
        }
        .action-buttons button:hover, .action-buttons a:hover {
            background: #1e4521;
        }
        .coverage-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .group-card {
            background: white;
            border-radius: 24px;
            padding: 0.8rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            border-left: 6px solid #88b04b;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .group-card.missing {
            border-left-color: #d9534f;
            background: #fff5f5;
        }
        .group-card:hover {
            transform: translateY(-2px);
        }
        .group-card h4 {
            margin: 0 0 0.3rem;
            font-size: 1rem;
        }
        .group-card .badge {
            font-size: 0.7rem;
            display: inline-block;
            margin-top: 5px;
            padding: 2px 8px;
            border-radius: 20px;
            background: #88b04b;
            color: white;
        }
        .group-card.missing .badge {
            background: #d9534f;
        }
        /* 折叠卡片样式 */
        .collapsible-group {
            margin-bottom: 1rem;
            border-radius: 28px;
            background: #fff;
            overflow: hidden;
            border: 1px solid #dee6d6;
        }
        .collapsible-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            padding: 0.8rem 1.2rem;
            background: #faf6e9;
            font-weight: bold;
            font-size: 1rem;
            transition: background 0.2s;
        }
        .collapsible-header:hover {
            background: #f5efdd;
        }
        .collapse-icon {
            font-size: 1.2rem;
            transition: transform 0.2s;
        }
        .collapsible-content {
            padding: 0;
            background: #fefef7;
        }
        .collapsed .collapsible-content {
            display: none;
        }
        .collapsed .collapse-icon {
            transform: rotate(-90deg);
        }
        .group-pet {
            display: inline-block;
            background: #e9f0e6;
            border-radius: 40px;
            padding: 6px 16px;
            margin: 6px;
            font-size: 0.85rem;
        }
        .group-pet .del {
            margin-left: 8px;
            cursor: pointer;
            color: #d9534f;
            font-weight: bold;
            padding: 0 4px;
        }
        .good-stud {
            background: #f1b82e;
            color: #2c2b1f;
        }
        .import-export {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 10px;
        }
        @media (max-width: 600px) {
            .coverage-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            }
            .group-pet {
                font-size: 0.75rem;
                padding: 4px 12px;
            }
            .action-buttons button, .action-buttons a {
                padding: 6px 16px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <div style="text-align:center; font-size:0.7rem; padding: 1rem; color: #6f7c64;">
        🧪 非商用工具 | 数据基于洛克王国 | 禁止用于盈利性目的
        </div>
        <h1>📦 种公仓库 · 蛋组覆盖分析</h1>
        <div class="nav-links">
            <a href="index.html">← 返回查询</a>
            <a href="stud.html">🏆 种公排行榜</a>
            <a href="admin.html">📝 数据维护</a>
        </div>
    </div>

    <div class="stats-card" id="statsArea">
        <h3>📊 当前仓库统计</h3>
        <div id="statsText"></div>
        <div class="import-export">
            <button id="exportDataBtn">📁 导出仓库数据</button>
            <label for="importFileInput" class="btn" style="background:#2b5e2f; color:white; padding:8px 20px; border-radius:40px; cursor:pointer;">📂 导入仓库数据</label>
            <input type="file" id="importFileInput" accept=".json" style="display:none;">
        </div>
    </div>

    <div class="action-buttons">
        <a href="index.html">➕ 返回主页添加宠物</a>
    </div>

    <h3>🗂️ 各蛋组覆盖情况（点击跳转）</h3>
    <div id="groupCoverage" class="coverage-grid"></div>

    <div id="petByGroupContainer"></div>
</div>

<script src="data.js"></script>
<script src="common.js"></script>
<script>
    refreshData();
    let myPets = [];
    let eggGroups = [];

    // 性格数据（与主页保持一致）
    const NATURE_INFO = {
        "聪明": { inc: "魔攻", dec: "物攻" }, "专注": { inc: "魔攻", dec: "物防" }, "偏执": { inc: "魔攻", dec: "魔防" },
        "冷静": { inc: "魔攻", dec: "速度" }, "理性": { inc: "魔攻", dec: "生命" }, "固执": { inc: "物攻", dec: "魔攻" },
        "大胆": { inc: "物攻", dec: "物防" }, "调皮": { inc: "物攻", dec: "魔防" }, "勇敢": { inc: "物攻", dec: "速度" },
        "逞强": { inc: "物攻", dec: "生命" }, "警惕": { inc: "魔防", dec: "物攻" }, "害羞": { inc: "魔防", dec: "魔攻" },
        "温顺": { inc: "魔防", dec: "物防" }, "慎重": { inc: "魔防", dec: "速度" }, "焦虑": { inc: "魔防", dec: "生命" },
        "稳重": { inc: "物防", dec: "物攻" }, "天真": { inc: "物防", dec: "魔攻" }, "悠闲": { inc: "物防", dec: "速度" },
        "懒散": { inc: "物防", dec: "魔防" }, "坦率": { inc: "物防", dec: "生命" }, "胆小": { inc: "速度", dec: "物攻" },
        "开朗": { inc: "速度", dec: "魔攻" }, "急躁": { inc: "速度", dec: "物防" }, "莽撞": { inc: "速度", dec: "魔防" },
        "热情": { inc: "速度", dec: "生命" }, "沉默": { inc: "生命", dec: "物攻" }, "平和": { inc: "生命", dec: "魔攻" },
        "忧郁": { inc: "生命", dec: "物防" }, "粗心": { inc: "生命", dec: "魔防" }, "踏实": { inc: "生命", dec: "速度" }
    };

    function loadMyPets() {
        const stored = localStorage.getItem('my_pets');
        if (stored) {
            try { myPets = JSON.parse(stored); } catch(e) { myPets = []; }
        } else {
            myPets = [];
        }
        renderAnalysis();
    }

    function saveMyPets() {
        localStorage.setItem('my_pets', JSON.stringify(myPets));
        renderAnalysis();
    }

    function getEggGroups() {
        if (eggGroups.length) return eggGroups;
        const data = getCurrentData();
        eggGroups = data.eggGroups;
        return eggGroups;
    }

    function getGroupToPetsMap() {
        const map = new Map();
        const groups = getEggGroups();
        groups.forEach(g => map.set(g, []));
        for (let pet of myPets) {
            const petGroups = getPetGroups(pet.name);
            for (let g of petGroups) {
                if (map.has(g)) {
                    map.get(g).push(pet);
                }
            }
        }
        return map;
    }

    function getPetStats(name) {
        const groups = getPetGroups(name);
        const matchCount = getPetMatchCount ? getPetMatchCount(name) : 0;
        return { groupsCount: groups.length, matchCount, groups };
    }

    function renderAnalysis() {
        const groups = getEggGroups();
        const groupMap = getGroupToPetsMap();
        const totalPets = myPets.length;
        const coveredGroups = Array.from(groupMap.entries()).filter(([_, pets]) => pets.length > 0).length;
        const missingCount = groups.length - coveredGroups;

        document.getElementById('statsText').innerHTML = `
            <p>🐾 共拥有 <strong>${totalPets}</strong> 只宠物，覆盖 <strong>${coveredGroups}</strong> 个蛋组，缺失 <strong>${missingCount}</strong> 个蛋组。</p>
            <p>⭐ 标记“优质”的宠物表示蛋组数 ≥ 2（更易配种）。</p>
            <p>⭐ 请随时导出仓库数据备份，该数据并不上传云端，只保存在本地浏览器。
        `;

        // 蛋组覆盖卡片（可点击跳转）
        const coverageDiv = document.getElementById('groupCoverage');
        coverageDiv.innerHTML = '';
        groups.forEach(group => {
            const pets = groupMap.get(group) || [];
            const has = pets.length > 0;
            const card = document.createElement('div');
            card.className = `group-card ${has ? '' : 'missing'}`;
            card.setAttribute('data-group', group);
            card.innerHTML = `
                <h4>${group}</h4>
                <div>${has ? `✅ ${pets.length}只` : '❌ 无宠物'}</div>
                <div class="badge">${has ? '已覆盖' : '缺失'}</div>
            `;
            card.addEventListener('click', () => scrollToGroup(group));
            coverageDiv.appendChild(card);
        });

        // 按蛋组显示可折叠宠物列表（无宠物或超过10只默认折叠）
        const container = document.getElementById('petByGroupContainer');
        container.innerHTML = '<h3>📌 按蛋组分组的宠物列表</h3>';
        groups.forEach(group => {
            const pets = groupMap.get(group) || [];
            const petCount = pets.length;
            // 默认折叠条件：无宠物 或 宠物数 > 10
            const defaultCollapsed = (petCount === 0 || petCount > 10);
            const section = document.createElement('div');
            section.className = 'collapsible-group';
            if (defaultCollapsed) section.classList.add('collapsed');
            section.setAttribute('data-groupname', group);

            let petsHtml = '';
            if (petCount === 0) {
                petsHtml = '<p style="color:#999; padding:1rem;">未拥有该蛋组的宠物</p>';
            } else {
                petsHtml = '<div style="padding:1rem;">';
                pets.forEach(pet => {
                    const stats = getPetStats(pet.name);
                    const isGood = stats.groupsCount >= 2;
                    const natureTip = NATURE_INFO[pet.nature] ? `${pet.nature}：+${NATURE_INFO[pet.nature].inc}  -${NATURE_INFO[pet.nature].dec}` : pet.nature;
                    petsHtml += `<span class="group-pet ${isGood ? 'good-stud' : ''}" title="${natureTip}">
                                    ${pet.name} (${pet.nature}) ${isGood ? '⭐优质' : ''}
                                    <span class="del" data-name="${pet.name}" data-nature="${pet.nature}">🗑️</span>
                                 </span>`;
                });
                petsHtml += '</div>';
            }

            section.innerHTML = `
                <div class="collapsible-header">
                    <span>📦 ${group} (${petCount}只)</span>
                    <span class="collapse-icon">▼</span>
                </div>
                <div class="collapsible-content">
                    ${petsHtml}
                </div>
            `;
            container.appendChild(section);
        });

        // 绑定折叠事件
        document.querySelectorAll('.collapsible-group').forEach(card => {
            const header = card.querySelector('.collapsible-header');
            if (header) {
                header.addEventListener('click', (e) => {
                    e.stopPropagation();
                    card.classList.toggle('collapsed');
                });
            }
        });

        // 事件委托删除宠物（二次确认）
        container.addEventListener('click', (e) => {
            const delBtn = e.target.closest('.del');
            if (!delBtn) return;
            e.stopPropagation();
            const name = delBtn.getAttribute('data-name');
            const nature = delBtn.getAttribute('data-nature');
            if (confirm(`确定从仓库中移除“${name} (${nature})”吗？`)) {
                const index = myPets.findIndex(p => p.name === name && p.nature === nature);
                if (index !== -1) {
                    myPets.splice(index, 1);
                    saveMyPets();
                }
            }
        });
    }

    // 滚动到指定蛋组并展开（如果折叠）
    function scrollToGroup(groupName) {
        const targetSection = Array.from(document.querySelectorAll('.collapsible-group')).find(
            section => section.getAttribute('data-groupname') === groupName
        );
        if (targetSection) {
            // 如果是折叠状态，先展开
            if (targetSection.classList.contains('collapsed')) {
                targetSection.classList.remove('collapsed');
            }
            targetSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
            // 高亮闪烁效果
            targetSection.style.transition = 'background 0.3s';
            targetSection.style.backgroundColor = '#fff8e7';
            setTimeout(() => { targetSection.style.backgroundColor = ''; }, 800);
        }
    }

    // 导出仓库数据
    function exportData() {
        const dataStr = JSON.stringify(myPets, null, 2);
        const blob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `pet_garage_backup_${new Date().toISOString().slice(0,19)}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    // 导入仓库数据（替换当前数据）
    function importData(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const imported = JSON.parse(e.target.result);
                if (Array.isArray(imported)) {
                    if (confirm(`导入将替换当前仓库中的 ${myPets.length} 只宠物，确定继续吗？`)) {
                        myPets = imported;
                        saveMyPets();
                        alert('导入成功！');
                    }
                } else {
                    alert('文件格式错误，不是有效的宠物仓库数据。');
                }
            } catch (err) {
                alert('解析失败，请确认 JSON 文件格式正确。');
            }
        };
        reader.readAsText(file);
    }

    // 按钮事件绑定
    document.getElementById('exportDataBtn').addEventListener('click', exportData);
    const importInput = document.getElementById('importFileInput');
    document.querySelector('label[for="importFileInput"]').addEventListener('click', () => {
        importInput.click();
    });
    importInput.addEventListener('change', (e) => {
        if (e.target.files.length) importData(e.target.files[0]);
        e.target.value = '';
    });

    loadMyPets();
</script>
</body>
</html>
